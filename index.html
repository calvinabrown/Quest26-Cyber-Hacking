<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER-SLIDE: LEVEL 1 (NEW PUZZLE)</title>
    <style>
        :root {
            --bg: #050505;
            --primary: #00f2ff;
            --secondary: #ff00ff;
            --grid-bg: #111;
            --cell-size: 80px;
        }

        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: calc(var(--cell-size) * 4 + 20px);
            height: calc(var(--cell-size) * 5 + 20px);
            background: var(--grid-bg);
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            padding: 10px;
            border-radius: 8px;
        }

        /* The Goal Zone Indicator */
        #exit-port {
            position: absolute;
            bottom: -5px;
            left: calc(var(--cell-size) + 10px);
            width: calc(var(--cell-size) * 2);
            height: 10px;
            background: var(--secondary);
            box-shadow: 0 0 15px var(--secondary);
            z-index: 10;
        }

        .piece {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255,255,255,0.1);
            box-sizing: border-box;
            transition: transform 0.1s ease-out;
            cursor: grab;
            user-select: none;
            border-radius: 4px;
        }

        .piece-2x2 {
            width: calc(var(--cell-size) * 2 - 4px);
            height: calc(var(--cell-size) * 2 - 4px);
            background: linear-gradient(45deg, #ff00ff, #800080);
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.5);
            z-index: 5;
        }

        .piece-1x2 {
            width: calc(var(--cell-size) - 4px);
            height: calc(var(--cell-size) * 2 - 4px);
            background: #222;
            border-color: var(--primary);
        }

        .piece-2x1 {
            width: calc(var(--cell-size) * 2 - 4px);
            height: calc(var(--cell-size) - 4px);
            background: #222;
            border-color: var(--primary);
        }

        .piece-1x1 {
            width: calc(var(--cell-size) - 4px);
            height: calc(var(--cell-size) - 4px);
            background: #333;
            border-color: #555;
        }

        #ui { margin-bottom: 20px; text-align: center; }
        button {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        button:hover { background: var(--primary); color: #000; }

        /* Success Overlay */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .unlock-anim {
            font-size: 3rem;
            color: var(--secondary);
            text-shadow: 0 0 20px var(--secondary);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div id="ui">
    <h2>SYSTEM OVERRIDE: L-1 (NEW PUZZLE)</h2>
    <button onclick="resetGame()">RESET_KERNEL</button>
</div>

<div id="game-container">
    <div id="exit-port"></div>
    <div id="board"></div>
</div>

<div id="overlay">
    <div class="unlock-anim">ACCESS GRANTED</div>
    <p>DECRYPTING NEXT LAYER...</p>
</div>

<script>
const CELL_SIZE = 80;
const ROWS = 5;
const COLS = 4;

// UPDATED Level 1 Config from user image: [x, y, width, height, id]
const initialLevel = [
    [0, 2, 2, 2, 'core'], // Large Red Core (2x2) at column 0, row 2
    [2, 1, 1, 2, 'p1'],   // Vertical Blue Block (1x2) at column 2, row 1
    [0, 0, 1, 1, 's1'],   // Small Yellow Blocks (1x1) at Row 0
    [1, 0, 1, 1, 's2'],
    [2, 0, 1, 1, 's3'],
    [3, 0, 1, 1, 's4'],
    [3, 1, 1, 1, 's5'],   // Small Yellow Blocks at other rows
    [3, 2, 1, 1, 's6'],
    [2, 3, 1, 1, 's7'],
    [3, 3, 1, 1, 's8'],
    [0, 4, 1, 1, 's9'],
    [1, 4, 1, 1, 's10'],
    [2, 4, 1, 1, 's11'],
    [3, 4, 1, 1, 's12'],
];

let pieces = JSON.parse(JSON.stringify(initialLevel));

function render() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    pieces.forEach((p, index) => {
        const el = document.createElement('div');
        el.className = `piece piece-${p[2]}x${p[3]} ${p[4] === 'core' ? 'piece-2x2' : ''}`;
        el.style.transform = `translate(${p[0] * CELL_SIZE}px, ${p[1] * CELL_SIZE}px)`;
        el.onmousedown = (e) => startDrag(e, index);
        el.ontouchstart = (e) => startDrag(e, index);
        board.appendChild(el);
    });
}

function startDrag(e, index) {
    const startX = e.type === 'mousedown' ? e.clientX : e.touches[0].clientX;
    const startY = e.type === 'mousedown' ? e.clientY : e.touches[0].clientY;
    
    const onMove = (moveEvent) => {
        const curX = moveEvent.type === 'mousemove' ? moveEvent.clientX : moveEvent.touches[0].clientX;
        const curY = moveEvent.type === 'mousemove' ? moveEvent.clientY : moveEvent.touches[0].clientY;
        
        const dx = curX - startX;
        const dy = curY - startY;

        if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
            let dir = [0, 0];
            if (Math.abs(dx) > Math.abs(dy)) dir = [dx > 0 ? 1 : -1, 0];
            else dir = [0, dy > 0 ? 1 : -1];
            
            tryMove(index, dir);
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('touchmove', onMove);
        }
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove);
    document.addEventListener('mouseup', () => {
        document.removeEventListener('mousemove', onMove);
    }, {once: true});
}

function tryMove(idx, [dx, dy]) {
    const p = pieces[idx];
    const newX = p[0] + dx;
    const newY = p[1] + dy;

    // Boundary check
    if (newX < 0 || newY < 0 || newX + p[2] > COLS || newY + p[3] > ROWS) return;

    // Collision check
    const collision = pieces.some((other, i) => {
        if (i === idx) return false;
        return (newX < other[0] + other[2] && newX + p[2] > other[0] &&
                newY < other[1] + other[3] && newY + p[3] > other[1]);
    });

    if (!collision) {
        p[0] = newX;
        p[1] = newY;
        render();
        checkWin();
    }
}

function checkWin() {
    const core = pieces.find(p => p[4] === 'core');
    // Win condition: Core is at bottom center (1, 3)
    if (core[0] === 1 && core[1] === 3) {
        document.getElementById('overlay').style.display = 'flex';
        setTimeout(() => {
            document.getElementById('overlay').style.display = 'none';
            resetGame();
        }, 3000);
    }
}

function resetGame() {
    pieces = JSON.parse(JSON.stringify(initialLevel));
    render();
}

render();
</script>
</body>
</html>
