<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CYBER-SLIDE: MOBILE FIXED</title>
    <style>
        :root {
            --bg: #050505;
            --primary: #00f2ff;
            --secondary: #ff00ff;
            --grid-bg: #111;
            /* Adaptive cell size: fits the screen width minus padding */
            --cell-size: clamp(50px, 22vw, 85px); 
        }

        * { box-sizing: border-box; touch-action: none; }

        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
        }

        #ui { margin-bottom: 10px; text-align: center; }
        
        #game-container {
            position: relative;
            /* Grid width is 4 cells, height is 5 cells */
            width: calc(var(--cell-size) * 4 + 10px);
            height: calc(var(--cell-size) * 5 + 10px);
            background: var(--grid-bg);
            border: 2px solid var(--primary);
            padding: 5px;
            border-radius: 8px;
        }

        #exit-port {
            position: absolute;
            bottom: -5px;
            left: calc(var(--cell-size) + 5px);
            width: calc(var(--cell-size) * 2);
            height: 10px;
            background: var(--secondary);
            box-shadow: 0 0 15px var(--secondary);
            z-index: 1;
        }

        .piece {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(0, 242, 255, 0.4);
            transition: transform 0.1s ease-out;
            border-radius: 4px;
            z-index: 2;
        }

        /* Using CSS variables for position so JS only has to update the --x and --y */
        .piece {
            transform: translate(calc(var(--x) * var(--cell-size)), calc(var(--y) * var(--cell-size)));
            width: calc(var(--w) * var(--cell-size) - 4px);
            height: calc(var(--h) * var(--cell-size) - 4px);
            margin: 2px;
        }

        .piece-core { 
            background: linear-gradient(45deg, #ff00ff, #800080); 
            border-color: #fff;
            z-index: 10; 
        }
        
        .piece-v { background: #1a1a1a; border-color: var(--primary); }
        .piece-s { background: #333; border-color: #666; }

        button {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 12px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }

        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div id="ui">
    <h2>SYSTEM OVERRIDE: L-1</h2>
    <button onclick="resetGame()">RESET_KERNEL</button>
</div>

<div id="game-container">
    <div id="exit-port"></div>
    <div id="board"></div>
</div>

<div id="overlay">
    <h1 style="color:var(--secondary)">ACCESS GRANTED</h1>
</div>

<script>
const ROWS = 5;
const COLS = 4;

// [x, y, width, height, type]
const initialLevel = [
    [0, 2, 2, 2, 'core'],
    [2, 1, 1, 2, 'v'],
    [0, 0, 1, 1, 's'], [1, 0, 1, 1, 's'], [2, 0, 1, 1, 's'], [3, 0, 1, 1, 's'],
    [3, 1, 1, 1, 's'], [3, 2, 1, 1, 's'], [2, 3, 1, 1, 's'], [3, 3, 1, 1, 's'],
    [0, 4, 1, 1, 's'], [1, 4, 1, 1, 's'], [2, 4, 1, 1, 's'], [3, 4, 1, 1, 's'],
];

let pieces = [];

function render() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    pieces.forEach((p, index) => {
        const el = document.createElement('div');
        el.className = `piece piece-${p[4]}`;
        
        // Use CSS variables for sizing and positioning
        el.style.setProperty('--x', p[0]);
        el.style.setProperty('--y', p[1]);
        el.style.setProperty('--w', p[2]);
        el.style.setProperty('--h', p[3]);

        // Support both Mouse and Touch
        el.onmousedown = (e) => startDrag(e, index);
        el.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            startDrag(e.touches[0], index);
        }, {passive: false});

        board.appendChild(el);
    });
}

function startDrag(startEvt, index) {
    const startX = startEvt.clientX;
    const startY = startEvt.clientY;
    let moved = false;

    const onMove = (moveEvt) => {
        if (moved) return;
        const e = moveEvt.touches ? moveEvt.touches[0] : moveEvt;
        
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;

        if (Math.abs(dx) > 25 || Math.abs(dy) > 25) {
            moved = true;
            let dir = Math.abs(dx) > Math.abs(dy) ? [dx > 0 ? 1 : -1, 0] : [0, dy > 0 ? 1 : -1];
            tryMove(index, dir);
            cleanup();
        }
    };

    const cleanup = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('touchmove', onMove);
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, {passive: false});
    document.addEventListener('mouseup', cleanup, {once: true});
    document.addEventListener('touchend', cleanup, {once: true});
}

function tryMove(idx, [dx, dy]) {
    const p = pieces[idx];
    const newX = p[0] + dx;
    const newY = p[1] + dy;

    if (newX < 0 || newY < 0 || newX + p[2] > COLS || newY + p[3] > ROWS) return;

    const collision = pieces.some((other, i) => {
        if (i === idx) return false;
        return (newX < other[0] + other[2] && newX + p[2] > other[0] &&
                newY < other[1] + other[3] && newY + p[3] > other[1]);
    });

    if (!collision) {
        p[0] = newX;
        p[1] = newY;
        render();
        checkWin();
    }
}

function checkWin() {
    const core = pieces.find(p => p[4] === 'core');
    if (core[0] === 1 && core[1] === 3) {
        document.getElementById('overlay').style.display = 'flex';
        setTimeout(() => {
            document.getElementById('overlay').style.display = 'none';
            resetGame();
        }, 2000);
    }
}

function resetGame() {
    pieces = JSON.parse(JSON.stringify(initialLevel));
    render();
}

resetGame();
</script>
</body>
</html>
